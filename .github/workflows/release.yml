name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_id:
        description: 'GitHub Release ID to upload assets to'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create module zip
        run: |
          zip -r Pf2eNpcMaker.zip \
            module.json \
            scripts/ \
            styles/ \
            templates/ \
            README.md

      - name: Upload release assets
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { repo, owner } = context.repo;
            const release_id = context.payload.release
              ? context.payload.release.id
              : parseInt('${{ inputs.release_id }}');

            // Upload module.json
            await github.rest.repos.uploadReleaseAsset({
              owner, repo, release_id,
              name: 'module.json',
              data: fs.readFileSync('module.json'),
            });

            // Upload zip
            await github.rest.repos.uploadReleaseAsset({
              owner, repo, release_id,
              name: 'Pf2eNpcMaker.zip',
              data: fs.readFileSync('Pf2eNpcMaker.zip'),
            });
