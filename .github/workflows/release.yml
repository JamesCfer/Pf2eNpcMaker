name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version from module.json
        id: version
        run: echo "version=$(jq -r .version module.json)" >> $GITHUB_OUTPUT

      - name: Create module zip
        run: |
          zip -r Pf2eNpcMaker.zip \
            module.json \
            scripts/ \
            styles/ \
            templates/ \
            README.md

      - name: Create GitHub Release and upload assets
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { repo, owner } = context.repo;
            const version = '${{ steps.version.outputs.version }}';
            const tag = `v${version}`;

            // Create release, or fetch existing if tag already exists
            let release;
            try {
              const res = await github.rest.repos.createRelease({
                owner, repo,
                tag_name: tag,
                name: tag,
                body: `Release ${tag}`,
                draft: false,
                prerelease: false,
              });
              release = res.data;
            } catch (e) {
              if (e.status === 422) {
                const list = await github.rest.repos.listReleases({ owner, repo });
                release = list.data.find(r => r.tag_name === tag);
                if (!release) throw new Error(`Tag ${tag} exists but release not found`);
                // Delete existing assets so we can re-upload
                for (const asset of release.assets) {
                  await github.rest.repos.deleteReleaseAsset({ owner, repo, asset_id: asset.id });
                }
              } else {
                throw e;
              }
            }

            // Upload module.json
            await github.rest.repos.uploadReleaseAsset({
              owner, repo,
              release_id: release.id,
              name: 'module.json',
              data: fs.readFileSync('module.json'),
            });

            // Upload zip
            await github.rest.repos.uploadReleaseAsset({
              owner, repo,
              release_id: release.id,
              name: 'Pf2eNpcMaker.zip',
              data: fs.readFileSync('Pf2eNpcMaker.zip'),
            });

      - name: Notify Foundry VTT Package Release API
        env:
          FOUNDRYVTT_RELEASE_TOKEN: ${{ secrets.FOUNDRYVTT_RELEASE_TOKEN }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST https://api.foundryvtt.com/packages/release_version/ \
            -H "Content-Type: application/json" \
            -H "Authorization: Token ${FOUNDRYVTT_RELEASE_TOKEN}" \
            -d '{
              "id": "pf2enpcmaker",
              "dry-run": false,
              "release": {
                "version": "${{ steps.version.outputs.version }}",
                "manifest": "https://github.com/JamesCfer/Pf2eNpcMaker/releases/latest/download/module.json",
                "notes": "https://github.com/JamesCfer/Pf2eNpcMaker/releases/tag/v${{ steps.version.outputs.version }}",
                "compatibility": {
                  "minimum": "13",
                  "verified": "13"
                }
              }
            }')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP status: $HTTP_CODE"
          echo "Response body: $BODY"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "ERROR: Foundry VTT API returned HTTP $HTTP_CODE"
            exit 1
          fi
